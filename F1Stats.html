<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080a0e;--surface:#0e1118;--surface2:#151b26;--surface3:#1c2333;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
  --text:#e8eaf0;--muted:#5a6070;--dim:#1a2030;

}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.4;}
header{padding:26px 48px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);}
.hi{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.brand{display:flex;align-items:baseline;gap:12px;}
.bt{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px;}
.bt span{color:var(--gold);}
.by{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:2px;}
.hm{display:flex;gap:10px;flex-wrap:wrap;}
.chip{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);background:var(--dim);border:1px solid var(--border);border-radius:2px;padding:4px 9px;letter-spacing:1px;}
.chip strong{color:var(--text);}
.nchip{background:rgba(232,197,71,0.08);border-color:rgba(232,197,71,0.2);color:var(--gold);}
.ld{width:6px;height:6px;border-radius:50%;background:#ff4444;display:inline-block;margin-right:4px;animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.tabs{display:flex;padding:0 48px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;}
.tab{padding:12px 18px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;user-select:none;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.content{padding:32px 48px;}
.panel{display:none;animation:fu 0.2s ease;}
.panel.active{display:block;}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.sec{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:11px;}
.rc{background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:17px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;}
.rc:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.3);}
.rc.done{opacity:0.72;}
.rc.next{border-color:rgba(232,197,71,0.35);background:rgba(232,197,71,0.02);}
.rc.sprint::after{content:'SPRINT';position:absolute;top:9px;right:9px;font-family:'IBM Plex Mono',monospace;font-size:7px;letter-spacing:1.5px;color:var(--gold);background:rgba(232,197,71,0.1);border:1px solid rgba(232,197,71,0.2);padding:2px 5px;}

.rco{font-family:'Bebas Neue',sans-serif;font-size:25px;letter-spacing:1px;line-height:1;margin-bottom:2px;}
.rci{font-size:10px;color:var(--muted);margin-bottom:9px;line-height:1.35;}
.rd{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--muted);}
.rw{margin-top:9px;padding-top:9px;border-top:1px solid var(--border);}
.rwl{font-family:'IBM Plex Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
.rwn{font-weight:500;font-size:12px;}
.rwt{font-size:9px;margin-top:1px;}
.rcd{margin-top:9px;padding-top:9px;border-top:1px solid var(--border);}
.rcdl{font-family:'IBM Plex Mono',monospace;font-size:7px;color:var(--gold);letter-spacing:1px;margin-bottom:2px;}
.rcdt{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--gold);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);z-index:500;display:none;align-items:flex-start;justify-content:center;padding:28px 16px;overflow-y:auto;}

.modal{background:var(--surface);border:1px solid var(--border2);border-radius:4px;width:100%;max-width:880px;animation:mp 0.2s cubic-bezier(0.4,0,0.2,1);}

.mtabs{display:flex;padding:0 28px;border-bottom:1px solid var(--border);background:var(--surface2);overflow-x:auto;}
.mt{padding:10px 15px;font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.14s;white-space:nowrap;user-select:none;}
.mt:hover{color:var(--text);}

.mb{padding:22px 28px;}
.mp{display:none;}

.pods{display:grid;grid-template-columns:1fr 1.1fr 1fr;gap:9px;margin-bottom:20px;}
.pod{background:var(--surface2);border:1px solid var(--border);border-radius:2px;padding:14px;position:relative;overflow:hidden;}
.pod::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--tc);}
.pbg{font-family:'Bebas Neue',sans-serif;font-size:64px;color:rgba(255,255,255,0.03);position:absolute;right:7px;top:-3px;line-height:1;}
.pm{font-size:13px;margin-bottom:4px;}
.pd{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.5px;line-height:1;}
.pt{font-family:'IBM Plex Mono',monospace;font-size:7px;text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;}
.ptm{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);margin-top:7px;}
.rtbl{width:100%;border-collapse:collapse;}
.rtbl th{font-family:'IBM Plex Mono',monospace;font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:6px 9px;text-align:left;border-bottom:1px solid var(--border);font-weight:400;}

.rgp{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);}

.ul{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:2px;margin-top:2px;}

}
</style>
</head>

  {round:7,country:'Canada',flag:'🇨🇦',circuit:'Circuit Gilles Villeneuve',raceDate:'2026-05-24',color:'#ff0000',sprint:true},
  {round:8,country:'Monaco',flag:'🇲🇨',circuit:'Circuit de Monaco',raceDate:'2026-06-07',color:'#ce1126',sprint:false},
  {round:9,country:'Spain',flag:'🇪🇸',circuit:'Circuit de Barcelona-Catalunya',raceDate:'2026-06-14',color:'#aa151b',sprint:false},
  {round:10,country:'Austria',flag:'🇦🇹',circuit:'Red Bull Ring, Spielberg',raceDate:'2026-06-28',color:'#ed2939',sprint:false},
  {round:11,country:'Great Britain',flag:'🇬🇧',circuit:'Silverstone Circuit',raceDate:'2026-07-05',color:'#012169',sprint:true},
  {round:12,country:'Belgium',flag:'🇧🇪',circuit:'Circuit de Spa-Francorchamps',raceDate:'2026-07-19',color:'#000000',sprint:false},
  {round:13,country:'Hungary',flag:'🇭🇺',circuit:'Hungaroring, Budapest',raceDate:'2026-07-26',color:'#436f4d',sprint:false},
  {round:14,country:'Netherlands',flag:'🇳🇱',circuit:'Circuit Zandvoort',raceDate:'2026-08-23',color:'#ae1c28',sprint:true},
  {round:15,country:'Italy',flag:'🇮🇹',circuit:'Autodromo Nazionale Monza',raceDate:'2026-09-06',color:'#009246',sprint:false},
  {round:16,country:'Madrid',flag:'🇪🇸',circuit:'Madrid Street Circuit (NEW)',raceDate:'2026-09-13',color:'#f1bf00',sprint:false,newTrack:true},
  {round:17,country:'Azerbaijan',flag:'🇦🇿',circuit:'Baku City Circuit',raceDate:'2026-09-26',color:'#0092bc',sprint:false,satRace:true},
  {round:18,country:'Singapore',flag:'🇸🇬',circuit:'Marina Bay Street Circuit',raceDate:'2026-10-11',color:'#ef3340',sprint:true},
  {round:19,country:'United States',flag:'🇺🇸',circuit:'Circuit of The Americas, Austin',raceDate:'2026-10-25',color:'#b22234',sprint:false},
  {round:20,country:'Mexico City',flag:'🇲🇽',circuit:'Autodromo Hermanos Rodriguez',raceDate:'2026-11-01',color:'#006847',sprint:false},
  {round:21,country:'Brazil',flag:'🇧🇷',circuit:'Autodromo Jose Carlos Pace',raceDate:'2026-11-08',color:'#009c3b',sprint:false},
  {round:22,country:'Las Vegas',flag:'🇺🇸',circuit:'Las Vegas Strip Circuit',raceDate:'2026-11-21',color:'#c8a000',sprint:false,satRace:true},
  {round:23,country:'Qatar',flag:'🇶🇦',circuit:'Lusail International Circuit',raceDate:'2026-11-29',color:'#8d1b3d',sprint:false},
  {round:24,country:'Abu Dhabi',flag:'🇦🇪',circuit:'Yas Marina Circuit',raceDate:'2026-12-06',color:'#00a651',sprint:false},
];

const DCS=[{name:'George Russell',team:'Mercedes',pts:26},{name:'Kimi Antonelli',team:'Mercedes',pts:18},{name:'Charles Leclerc',team:'Ferrari',pts:15},{name:'Lewis Hamilton',team:'Ferrari',pts:12},{name:'Lando Norris',team:'McLaren',pts:10},{name:'Max Verstappen',team:'Red Bull',pts:8},{name:'Oliver Bearman',team:'Haas',pts:6},{name:'Arvid Lindblad',team:'Racing Bulls',pts:4},{name:'G. Bortoleto',team:'Audi',pts:2},{name:'Pierre Gasly',team:'Alpine',pts:1}];
const CCS=[{name:'Mercedes',pts:44},{name:'Ferrari',pts:27},{name:'McLaren',pts:10},{name:'Red Bull',pts:8},{name:'Haas',pts:6},{name:'Racing Bulls',pts:4},{name:'Audi',pts:2},{name:'Alpine',pts:1}];

const TODAY=new Date();
const pd=s=>new Date(s+'T00:00:00');
const done=r=>pd(r.raceDate)<TODAY;
const fmtD=s=>pd(s).toLocaleDateString('en-US',{day:'numeric',month:'short',year:'numeric'});
function tUntil(s){const d=pd(s)-TODAY;if(d<=0)return null;const dy=Math.floor(d/86400000),h=Math.floor((d%86400000)/3600000),m=Math.floor((d%3600000)/60000);return dy>0?`${dy}d ${h}h`:h>0?`${h}h ${m}m`:`${m}m`;}

// CALENDAR
let nxSet=false;
function renderCal(){
  const g=document.getElementById('cg');g.innerHTML='';nxSet=false;
  RACES.forEach(r=>{
    const isD=done(r),isN=!isD&&!nxSet;
    if(isN){nxSet=true;document.getElementById('hn').textContent=r.country+' GP';document.getElementById('hc').textContent=tUntil(r.raceDate)||'Soon';}
    const d=document.createElement('div');
    d.className=`rc${isD?' done':''}${isN?' next':''}${r.sprint?' sprint':''}`;
    d.style.setProperty('--rc',r.color);
    d.innerHTML=`<div class="rr">RND ${r.round} · ${r.flag}</div><div class="rco">${r.country}</div><div class="rci">${r.circuit}</div><div class="rd">🗓 ${fmtD(r.raceDate)}</div>
      ${isD&&r.result?`<div class="rw"><div class="rwl">Winner</div><div class="rwn">${r.result.winner}</div><div class="rwt" style="color:${tc(r.result.winnerTeam)}">${r.result.winnerTeam}</div></div>`:''}
      ${isN?`<div class="rcd"><div class="rcdl">Lights out in</div><div class="rcdt" id="cd-${r.round}">${tUntil(r.raceDate)||'Soon'}</div></div>`:''}
      ${!isD&&!isN?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--muted)">Upcoming</div>`:''}`;
    d.addEventListener('click',()=>openM(r));
    g.appendChild(d);
  });
}
setInterval(()=>{RACES.forEach(r=>{const e=document.getElementById('cd-'+r.round);if(e)e.textContent=tUntil(r.raceDate)||'Soon';});const nr=RACES.find(r=>!done(r));if(nr)document.getElementById('hc').textContent=tUntil(nr.raceDate)||'Soon';},30000);

// MODAL
let ac=null;
function openM(r){
  document.getElementById('mr').textContent=`Round ${r.round} · 2026 FIA F1 World Championship${r.sprint?' · Sprint Weekend':''}`;
  document.getElementById('mt').innerHTML=`${r.flag} ${r.country} <span>GP</span>`;
  document.getElementById('mc').textContent=`${r.circuit} · ${fmtD(r.raceDate)}`;
  if(ac){ac.destroy();ac=null;}
  const isD=done(r)&&r.result;
  const tabs=isD?[{id:'results',l:'Results'},{id:'positions',l:'Position Chart'},{id:'story',l:'Race Story'},{id:'stats',l:'Key Stats'}]:[{id:'upcoming',l:'Race Preview'}];
  document.getElementById('mtabs').innerHTML=tabs.map((t,i)=>`<div class="mt${i===0?' active':''}" onclick="swMT('${t.id}',this,${r.round})">${t.l}</div>`).join('');
  const mb=document.getElementById('mb');
  if(isD){mb.innerHTML=buildPanels(r);setTimeout(()=>buildChart(r),60);}
  else mb.innerHTML=buildUp(r);
  document.getElementById('mbg').classList.add('open');
}
function cm(){document.getElementById('mbg').classList.remove('open');if(ac){ac.destroy();ac=null;}}
function bgc(e){if(e.target.id==='mbg')cm();}
function swMT(id,el,rnd){
  document.querySelectorAll('.mt').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  document.querySelectorAll('.mp').forEach(p=>p.classList.remove('active'));
  document.getElementById('mp-'+id).classList.add('active');
  if(id==='positions'){const r=RACES.find(x=>x.round===rnd);if(r&&!ac)setTimeout(()=>buildChart(r),60);}
}

function buildPanels(r){
  const res=r.result;
  return `
  <div class="mp active" id="mp-results">
    <div class="sec" style="margin-bottom:10px">Podium</div>
    <div class="pods">
      <div class="pod" style="--tc:${tc(res.p3team)}"><div class="pbg">3</div><div class="pm">🥉</div><div class="pd">${res.p3}</div><div class="pt" style="color:${tc(res.p3team)}">${res.p3team}</div></div>
      <div class="pod" style="--tc:${tc(res.winnerTeam)}"><div class="pbg">1</div><div class="pm">🥇</div><div class="pd">${res.winner}</div><div class="pt" style="color:${tc(res.winnerTeam)}">${res.winnerTeam}</div></div>
      <div class="pod" style="--tc:${tc(res.p2team)}"><div class="pbg">2</div><div class="pm">🥈</div><div class="pd">${res.p2}</div><div class="pt" style="color:${tc(res.p2team)}">${res.p2team}</div></div>
    </div>
    <div class="sec">Full Classification</div>
    <table class="rtbl"><thead><tr><th>Pos</th><th>Driver</th><th>Team</th><th>Gap</th><th>Pts</th></tr></thead><tbody>
      ${res.full.map((d,i)=>`<tr style="animation-delay:${i*0.02}s"><td><span class="rp${typeof d.pos==='number'&&d.pos<=3?' g':''}">${d.pos}</span></td><td><span class="rn">${d.driver}</span><span class="ra">${d.abbr}</span>${d.fl?'<span class="flb">FL</span>':''}</td><td><span class="rtm2"><span class="td" style="background:${tc(d.team)}"></span>${d.team}</span></td><td>${d.dnf?'<span class="dnfb">DNF</span>':d.dns?'<span class="dnsb">DNS</span>':`<span class="rgp">${d.gap}</span>`}</td><td><span class="rpt">${d.pts>0?'+'+d.pts:'—'}</span></td></tr>`).join('')}
    </tbody></table>
  </div>
  <div class="mp" id="mp-positions">
    <div class="cbox"><div class="clbl">Race Position by Lap — Top Drivers</div><canvas id="pc" height="320"></canvas><div class="cleg" id="cl"></div></div>
  </div>
  <div class="mp" id="mp-story">
    <div class="moments">${res.moments.map((m,i)=>`<div class="mom" style="animation-delay:${i*0.04}s"><div><div class="mlp">${m.lap}</div><div class="mlpl">Lap</div></div><div><div class="mtt">${m.title}</div><div class="mtd">${m.desc}</div></div></div>`).join('')}</div>
  </div>
  <div class="mp" id="mp-stats">
    <div class="sec">Race Statistics</div>
    <div class="sg">
      <div class="sb" style="--sc:${tc(res.winnerTeam)}"><div class="sn" style="font-size:18px;padding-top:4px">${res.winner.split(' ').pop()}</div><div class="sl">Race Winner</div><div class="ss" style="color:${tc(res.winnerTeam)}">${res.winnerTeam}</div></div>
      <div class="sb" style="--sc:#c084fc"><div class="sn">${res.laps}</div><div class="sl">Laps</div><div class="ss">58 scheduled</div></div>
      <div class="sb" style="--sc:#60a5fa"><div class="sn">${res.classified}</div><div class="sl">Classified</div><div class="ss">${res.retirements} DNF/DNS</div></div>
      <div class="sb" style="--sc:#4ade80"><div class="sn">${res.vsc}</div><div class="sl">VSC Periods</div><div class="ss">${res.safetyCars} Safety Car</div></div>
      <div class="sb" style="--sc:var(--mercedes)"><div class="sn" style="font-size:16px;padding-top:6px">${res.fastestLap}</div><div class="sl">Fastest Lap</div><div class="ss">Russell · Mercedes</div></div>
      <div class="sb" style="--sc:var(--gold)"><div class="sn">${res.leadChanges}</div><div class="sl">Lead Changes</div><div class="ss">Laps 1–9</div></div>
      <div class="sb" style="--sc:var(--mercedes)"><div class="sn">44</div><div class="sl">Mercedes Pts</div><div class="ss">1-2 finish</div></div>
      <div class="sb" style="--sc:var(--redbull)"><div class="sn">20→6</div><div class="sl">Verstappen</div><div class="ss">Positions gained</div></div>
    </div>
    <div class="sec" style="margin-top:6px">Constructor Points After R1</div>
    <div style="display:flex;flex-direction:column;gap:7px">
      ${[{t:'Mercedes',p:44},{t:'Ferrari',p:27},{t:'McLaren',p:10},{t:'Red Bull',p:8},{t:'Haas',p:6},{t:'Racing Bulls',p:4},{t:'Audi',p:2},{t:'Alpine',p:1}].map(c=>`
      <div style="display:flex;align-items:center;gap:9px">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--muted);width:90px;flex-shrink:0">${c.t}</span>
        <div style="flex:1;height:4px;background:var(--dim);border-radius:2px;overflow:hidden"><div style="height:100%;width:${(c.p/44*100).toFixed(1)}%;background:${tc(c.t)};border-radius:2px"></div></div>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;width:22px;text-align:right">${c.p}</span>
      </div>`).join('')}
    </div>
  </div>`;
}

function buildChart(r){
  const canvas=document.getElementById('pc');
  if(!canvas||!r.result||!r.result.posData) return;
  if(ac){ac.destroy();ac=null;}
  const res=r.result;
  ac=new Chart(canvas.getContext('2d'),{
    type:'line',
    data:{labels:res.posLabels,datasets:res.posData.map(d=>({label:d.abbr,data:d.pos,borderColor:tc(d.team),backgroundColor:'transparent',borderWidth:2.5,pointRadius:4,pointHoverRadius:6,pointBackgroundColor:tc(d.team),tension:0.35}))},
    options:{responsive:true,animation:{duration:900,easing:'easeInOutQuart'},
      scales:{
        y:{reverse:true,min:1,max:20,ticks:{color:'#5a6070',font:{family:"'IBM Plex Mono',monospace",size:8},stepSize:1,callback:v=>v<=10?'P'+v:(v===20?'P20':'')},grid:{color:'rgba(255,255,255,0.04)'},border:{color:'rgba(255,255,255,0.06)'}},
        x:{ticks:{color:'#5a6070',font:{family:"'IBM Plex Mono',monospace",size:7}},grid:{color:'rgba(255,255,255,0.04)'},border:{color:'rgba(255,255,255,0.06)'}}
      },
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#0e1118',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,titleColor:'#e8c547',bodyColor:'#a0a8b8',titleFont:{family:"'IBM Plex Mono',monospace",size:9},bodyFont:{family:"'IBM Plex Mono',monospace",size:9},callbacks:{title:i=>i[0].dataset.label,label:i=>'P'+i.raw}}}
    }
  });
  const cl=document.getElementById('cl');
  if(cl) cl.innerHTML=res.posData.map(d=>`<div class="cli"><div class="cll" style="background:${tc(d.team)}"></div>${d.abbr}</div>`).join('');
}

function buildUp(r){
  const rd=pd(r.raceDate),fri=new Date(rd),sat=new Date(rd);
  fri.setDate(rd.getDate()-2);sat.setDate(rd.getDate()-1);
  const fmt=d=>d.toLocaleDateString('en-US',{weekday:'short',day:'numeric',month:'short'});
  const sess=r.sprint?[{n:'Practice 1',d:fri},{n:'Sprint Qualifying',d:fri},{n:'Sprint Race',d:sat},{n:'Qualifying',d:sat},{n:'Grand Prix 🏁',d:rd}]:[{n:'Practice 1',d:fri},{n:'Practice 2',d:fri},{n:'Practice 3',d:sat},{n:'Qualifying',d:sat},{n:'Grand Prix 🏁',d:rd}];
  const cd=tUntil(r.raceDate);
  return `<div class="mp active" id="mp-upcoming">
    <div class="uh"><div class="ucd">${cd||'SOON'}</div><div class="ul">Until Lights Out</div></div>
    <div class="sec">Weekend Schedule</div>
    <div class="sl2">${sess.map(s=>`<div class="sr"><span class="sn2">${s.n}</span><span class="sd">${fmt(s.d)}</span></div>`).join('')}</div>
    ${r.sprint?'<div class="notice">⚡ Sprint Weekend — Sprint Race replaces FP3 on Saturday</div>':''}
    ${r.newTrack?'<div class="notice">🆕 Madrid makes its F1 debut — brand new street circuit</div>':''}
    ${r.satRace?'<div class="notice ng">📅 Race day is Saturday, not Sunday</div>':''}
  </div>`;
}

// CHAMPIONSHIP
function renderChamp(){
  const mx=DCS[0].pts;
  document.getElementById('dc').innerHTML=DCS.map((d,i)=>`<div class="cr" style="animation-delay:${i*0.04}s"><span class="crk">${i+1}</span><span class="cnm">${d.name}</span><div class="cbg"><div class="cbf" style="background:${tc(d.team)};width:0" data-w="${(d.pts/mx*100).toFixed(1)}%"></div></div><span class="cpt">${d.pts}</span></div>`).join('');
  const mc=CCS[0].pts;
  document.getElementById('cc').innerHTML=CCS.map((c,i)=>`<div class="cr" style="animation-delay:${i*0.04}s"><span class="crk">${i+1}</span><span class="cnm">${c.name}</span><div class="cbg"><div class="cbf" style="background:${tc(c.name)};width:0" data-w="${(c.pts/mc*100).toFixed(1)}%"></div></div><span class="cpt">${c.pts}</span></div>`).join('');
  setTimeout(()=>document.querySelectorAll('.cbf').forEach(b=>b.style.width=b.dataset.w),150);
}

function showMain(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');document.getElementById('panel-'+id).classList.add('active');
  if(id==='championship') setTimeout(()=>document.querySelectorAll('.cbf').forEach(b=>b.style.width=b.dataset.w),100);
}

renderCal();renderChamp();
</script>
